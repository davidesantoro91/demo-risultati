<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Inserisci Risultato</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f2f5;
  --white: #ffffff;
  --blue: #0066cc;
  --green: #27ae60;
  --red: #e74c3c;
  --text: #1a1a2e;
  --text2: #666688;
  --border: #e0e4ee;
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

/* HEADER */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  position: sticky; top: 0; z-index: 10;
}
header img { height: 36px; object-fit: contain; }

/* SCREEN */
.screen {
  min-height: calc(100dvh - 120px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
}

.page-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(22px, 6vw, 32px);
  font-weight: 800;
  color: var(--text);
  text-align: center;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.page-sub {
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  margin-bottom: 28px;
}

.card {
  width: 100%;
  max-width: 400px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.field-lbl {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Category grid */
.cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.cbtn {
  background: #f8faff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 13px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.cbtn:active { transform: scale(0.96); }
.cbtn.sel {
  background: #eef5ff;
  border-color: var(--blue);
  color: var(--blue);
  font-weight: 600;
  box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
}

/* Percentage */
.pct-display {
  text-align: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 64px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: -0.03em;
  line-height: 1;
  margin: 10px 0 6px;
  transition: color 0.3s;
}
.pct-display .u { font-size: 28px; font-weight: 600; vertical-align: super; margin-left: 2px; }

.slider-wrap { position: relative; padding: 12px 0; margin-bottom: 6px; }
input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: transparent; outline: none; cursor: pointer; }
.track-bg { position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: #e0e4ee; border-radius: 99px; transform: translateY(-50%); pointer-events: none; }
.track-fill { position: absolute; top: 50%; left: 0; height: 4px; background: var(--blue); border-radius: 99px; transform: translateY(-50%); pointer-events: none; transition: width 0.05s; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--white); border: 2.5px solid var(--blue); border-radius: 50%; box-shadow: 0 2px 8px rgba(0,102,204,0.25); }
.pct-labels { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 24px; }

/* Submit button */
.btn-send {
  width: 100%;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: var(--blue);
  border: none;
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(0,102,204,0.3);
  -webkit-tap-highlight-color: transparent;
}
.btn-send:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,102,204,0.2); }
.btn-send:hover { background: #0055bb; }
.sending { display: none; text-align: center; padding: 14px; font-size: 12px; color: var(--text2); }

/* SUCCESS */
#succ { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(240,242,245,0.97); flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
#succ.show { display: flex; }
.s-circle {
  width: 88px; height: 88px;
  background: #eafaf1;
  border: 2.5px solid #27ae60;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  font-size: 36px;
}
@keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.s-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 8px; animation: fu .4s .2s both; }
.s-sub { font-size: 13px; color: var(--text2); animation: fu .4s .3s both; }
.s-data { margin-top: 24px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 16px 32px; animation: fu .4s .45s both; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.s-cat { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.s-pct { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 48px; font-weight: 800; color: var(--blue); letter-spacing: -0.03em; }
@keyframes fu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* FOOTER */
footer {
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 20px;
}
.footer-txt { font-size: 11px; color: var(--text2); font-weight: 500; }
footer img { height: 24px; object-fit: contain; }
</style>
</head>

<div id="succ">
  <div class="s-circle">✓</div>
  <div class="s-title">Risultato inviato!</div>
  <div class="s-sub">Il tuo risultato è ora visibile sulla dashboard</div>
  <div class="s-data">
    <div class="s-cat" id="sc">—</div>
    <div class="s-pct" id="sp">0%</div>
  </div>
</div>

<script>
let selC = null;
document.querySelectorAll('.cbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.cbtn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel'); selC = b.dataset.cat;
  });
});

const sl = document.getElementById('sl'), pd = document.getElementById('pdsp'), tf = document.getElementById('tf');
sl.addEventListener('input', () => {
  const v = sl.value;
  pd.innerHTML = v + '<span class="u">%</span>';
  tf.style.width = v + '%';
  const col = v > 70 ? '#27ae60' : v > 40 ? '#0066cc' : '#3498db';
  pd.style.color = col;
  tf.style.background = col;
});

async function invia() {
  if (!selC) { fe('Seleziona una categoria'); return; }
  const pct = parseInt(sl.value);
  const btn = document.getElementById('bsend'), snd = document.getElementById('sendlbl');
  btn.style.display = 'none'; snd.style.display = 'block';
  try {
    const r = await fetch('/api/risultati', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({categoria:selC, punteggio:pct})});
    if (!r.ok) throw new Error();
    document.getElementById('sc').textContent = selC;
    document.getElementById('sp').textContent = pct + '%';
    document.getElementById('succ').classList.add('show');
  } catch(e) {
    btn.style.display = 'block'; snd.style.display = 'none'; fe('Errore di rete');
  }
}

function fe(msg) {
  const b = document.getElementById('bsend');
  b.textContent = '⚠ ' + msg; b.style.background = '#e74c3c';
  setTimeout(() => { b.textContent = 'Invia Risultato →'; b.style.background = ''; }, 1600);
}
