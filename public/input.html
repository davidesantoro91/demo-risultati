<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>INSERISCI RISULTATO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #000a0e; --cyan: #00f5ff; --green: #39ff14; --red: #ff2d55; --dim: #2a5560; --text: #c8f0f5; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }
body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,245,255,.012) 3px,rgba(0,245,255,.012) 4px); pointer-events:none; z-index:9999; }
canvas#bgC { position:fixed; inset:0; z-index:0; }

.htop { position:fixed; top:0; left:0; right:0; padding:11px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(0,245,255,.1); background:rgba(0,5,8,.92); backdrop-filter:blur(8px); z-index:20; }
.hlbl { font-family:'Orbitron',monospace; font-size:7px; letter-spacing:.2em; color:var(--dim); text-transform:uppercase; }
.hlive { display:flex; align-items:center; gap:5px; font-size:8px; letter-spacing:.15em; color:var(--green); }
.hdot { width:5px; height:5px; background:var(--green); border-radius:50%; box-shadow:0 0 7px var(--green); animation:blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.05} }

.screen { position:relative; z-index:10; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px 30px; }
.inpc { width:100%; max-width:390px; }
.gtitle { font-family:'Orbitron',monospace; font-size:clamp(18px,5.5vw,28px); font-weight:900; color:var(--cyan); text-transform:uppercase; letter-spacing:.08em; text-shadow:0 0 22px rgba(0,245,255,.6); animation:glitch 5s infinite; text-align:center; margin-bottom:5px; }
@keyframes glitch { 0%,95%,100%{transform:none;filter:none} 96%{transform:translate(-2px,0) skewX(-1deg);filter:hue-rotate(90deg)} 97%{transform:translate(2px,0);filter:none} 98%{transform:translate(-1px,0);filter:hue-rotate(-90deg)} }
.gsub { text-align:center; font-size:9px; letter-spacing:.2em; color:var(--dim); text-transform:uppercase; margin-bottom:26px; }

.fcard { background:rgba(0,13,16,.96); border:1px solid rgba(0,245,255,.18); border-radius:3px; padding:26px 22px; position:relative; box-shadow:0 0 40px rgba(0,245,255,.03); }
.fcard::before,.fcard::after { content:''; position:absolute; width:15px; height:15px; border-color:var(--cyan); border-style:solid; }
.fcard::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
.fcard::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

.flbl { font-size:8px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; margin-bottom:10px; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:24px; }
.cbtn { background:rgba(0,245,255,.02); border:1px solid rgba(0,245,255,.12); border-radius:2px; color:var(--dim); font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:.08em; padding:13px 6px; text-align:center; cursor:pointer; transition:all .18s; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
.cbtn:active { transform:scale(.95); }
.cbtn.sel { background:rgba(0,245,255,.09); border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 16px rgba(0,245,255,.12); text-shadow:0 0 8px var(--cyan); }

.pdisp { text-align:center; font-family:'Orbitron',monospace; font-size:58px; font-weight:700; color:var(--cyan); text-shadow:0 0 30px rgba(0,245,255,.5); letter-spacing:-.02em; margin:8px 0 4px; line-height:1; transition:color .3s,text-shadow .3s; }
.pdisp .u { font-size:22px; font-weight:400; vertical-align:super; margin-left:2px; }
.swrap { position:relative; padding:14px 0; margin-bottom:6px; }
input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:2px; background:transparent; outline:none; cursor:pointer; }
.tbg { position:absolute; top:50%; left:0; right:0; height:2px; background:rgba(0,245,255,.12); transform:translateY(-50%); pointer-events:none; }
.tfill { position:absolute; top:50%; left:0; height:2px; background:var(--cyan); box-shadow:0 0 8px var(--cyan); transform:translateY(-50%); pointer-events:none; transition:width .05s; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:24px; height:24px; background:var(--bg); border:2px solid var(--cyan); border-radius:50%; box-shadow:0 0 14px var(--cyan); }
.plbls { display:flex; justify-content:space-between; font-size:8px; color:var(--dim); letter-spacing:.08em; margin-bottom:22px; }

.bsend { width:100%; font-family:'Orbitron',monospace; font-size:13px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--bg); background:var(--cyan); border:none; border-radius:2px; padding:17px; cursor:pointer; transition:all .2s; box-shadow:0 0 22px rgba(0,245,255,.28); -webkit-tap-highlight-color:transparent; position:relative; overflow:hidden; }
.bsend::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent); transform:translateX(-100%); transition:transform .5s; }
.bsend:hover::before { transform:translateX(100%); }
.bsend:active { transform:scale(.98); }
.sending { display:none; text-align:center; padding:13px; font-size:10px; color:var(--dim); letter-spacing:.2em; animation:blink .8s infinite; }

/* SUCCESS */
#succ { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,10,14,.97); flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; }
#succ.show { display:flex; }
.sring { width:92px; height:92px; border:2px solid var(--cyan); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 26px; box-shadow:0 0 30px rgba(0,245,255,.4); animation:rp .5s cubic-bezier(.175,.885,.32,1.275); }
@keyframes rp { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.schk { font-size:38px; color:var(--cyan); text-shadow:0 0 20px var(--cyan); }
.stit { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; color:var(--cyan); letter-spacing:.1em; margin-bottom:10px; animation:fu .4s .2s both; }
.ssub { font-size:11px; color:var(--dim); letter-spacing:.15em; text-transform:uppercase; animation:fu .4s .35s both; }
.sdata { margin-top:26px; background:rgba(0,245,255,.04); border:1px solid rgba(0,245,255,.15); border-radius:3px; padding:16px 32px; animation:fu .4s .5s both; }
.scat { font-family:'Orbitron',monospace; font-size:14px; color:var(--text); letter-spacing:.1em; }
.spct { font-family:'Orbitron',monospace; font-size:44px; font-weight:700; color:var(--cyan); text-shadow:0 0 20px rgba(0,245,255,.5); }
@keyframes fu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<canvas id="bgC"></canvas>

<div class="htop">
  <span class="hlbl">SYS // INPUT TERMINAL</span>
  <div class="hlive"><div class="hdot"></div>TRASMISSIONE ATTIVA</div>
</div>

<div class="screen">
  <div class="inpc">
    <div class="gtitle">Inserisci Risultato</div>
    <div class="gsub">// seleziona categoria e percentuale //</div>
    <div class="fcard">
      <div class="flbl">▸ Categoria</div>
      <div class="cgrid">
        <button class="cbtn" data-cat="Produzione">Sviluppo Software</button>
        <button class="cbtn" data-cat="Qualità">Marketing</button>
        <button class="cbtn" data-cat="Vendite">Commerciale</button>
        <button class="cbtn" data-cat="R&D">R &amp; D</button>
        <button class="cbtn" data-cat="Logistica">Architetto</button>
        <button class="cbtn" data-cat="Altro">Altro</button>
      </div>
      <div class="flbl">▸ Percentuale ottenuta</div>
      <div class="pdisp" id="pdsp">0<span class="u">%</span></div>
      <div class="swrap">
        <div class="tbg"></div>
        <div class="tfill" id="tf" style="width:0%"></div>
        <input type="range" id="sl" min="0" max="100" value="0">
      </div>
      <div class="plbls"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>
      <button class="bsend" id="bsend" onclick="invia()">◈ &nbsp; INVIA RISULTATO &nbsp; ◈</button>
      <div class="sending" id="sendlbl">▸ INVIO IN CORSO...</div>
    </div>
  </div>
</div>

<div id="succ">
  <div class="sring"><span class="schk">✓</span></div>
  <div class="stit">TRASMESSO</div>
  <div class="ssub">Dati inviati alla dashboard</div>
  <div class="sdata"><div class="scat" id="sc">—</div><div class="spct" id="sp">0%</div></div>
</div>

<script>
// BG
const bgC=document.getElementById('bgC'),bgX=bgC.getContext('2d');
let BW,BH;
const pts=Array.from({length:50},()=>({x:Math.random()*1000,y:Math.random()*1000,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*.8+.2,a:Math.random()*.2+.03}));
function rbg(){BW=bgC.width=innerWidth;BH=bgC.height=innerHeight;}rbg();addEventListener('resize',rbg);
(function ab(){bgX.clearRect(0,0,BW,BH);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;const x=((p.x%BW)+BW)%BW,y=((p.y%BH)+BH)%BH;bgX.beginPath();bgX.arc(x,y,p.r,0,Math.PI*2);bgX.fillStyle=`rgba(0,245,255,${p.a})`;bgX.fill();});requestAnimationFrame(ab);})();

// Category
let selC = null;
document.querySelectorAll('.cbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); selC=b.dataset.cat;
  });
});

// Slider
const sl=document.getElementById('sl'),pd=document.getElementById('pdsp'),tf=document.getElementById('tf');
sl.addEventListener('input',()=>{
  const v=sl.value;
  pd.innerHTML=v+'<span class="u">%</span>';
  tf.style.width=v+'%';
  const col=v>70?'#39ff14':v>40?'#00f5ff':'#00bcd4';
  pd.style.color=col;pd.style.textShadow=`0 0 28px ${col}80`;
  tf.style.background=col;tf.style.boxShadow=`0 0 8px ${col}`;
});

// Invia
async function invia(){
  if(!selC){fe('Seleziona una categoria');return;}
  const pct=parseInt(sl.value);
  const btn=document.getElementById('bsend'),snd=document.getElementById('sendlbl');
  btn.style.display='none'; snd.style.display='block';
  try{
    const r=await fetch('/api/risultati',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({categoria:selC,punteggio:pct})});
    if(!r.ok) throw new Error();
    document.getElementById('sc').textContent=selC.toUpperCase();
    document.getElementById('sp').textContent=pct+'%';
    document.getElementById('succ').classList.add('show');
  }catch(e){
    btn.style.display='block'; snd.style.display='none'; fe('Errore di rete');
  }
}

function fe(msg){
  const b=document.getElementById('bsend');
  b.textContent='⚠ '+msg; b.style.background='#ff2d55';
  setTimeout(()=>{b.innerHTML='◈ &nbsp; INVIA RISULTATO &nbsp; ◈';b.style.background='';},1600);
}
</script>
</body>
</html>
